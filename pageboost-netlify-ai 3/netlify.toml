[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Enable Netlify AI Gateway (automatically injects Anthropic credentials)
[build.environment]
  NETLIFY_AI_ENABLED = "true"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
